services:
  api-gateway:
    image: samarkinivan/api-gateway:latest
    container_name: api-gateway
    restart: on-failure
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_PORT: 8080
      ALLOWED_ORIGIN_URL: 'http://144.31.105.102:3000'
      AUTH_SERVICE_API_URL: 'http://host.docker.internal:8081'
      ACCOUNTS_SERVICE_API_URL: 'http://host.docker.internal:8082'
      CHAT_SERVICE_API_URL: 'http://host.docker.internal:8083'
      NOTIFICATIONS_SERVICE_API_URL: 'http://host.docker.internal:8084'
      AI_SERVICE_API_URL: 'http://host.docker.internal:8085'
      CHAT_SERVICE_WS_URL: 'http://host.docker.internal:8083'
    ports:
      - '8080:8080'
